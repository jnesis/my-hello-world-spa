<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure SWA Auth POC</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; line-height: 1.5; }
        .token-box { background: #f4f4f4; padding: 1rem; border-radius: 8px; overflow-x: auto; border: 1px solid #ddd; }
        .status { font-weight: bold; color: #0078d4; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>Azure Static Web Apps Auth POC</h1>
    
    <div id="auth-status">
        <p>Status: <span class="status">Checking authentication...</span></p>
    </div>

    <div id="logged-in-content" class="hidden">
        <h3>User Details</h3>
        <p><strong>Provider:</strong> <span id="user-provider"></span></p>
        <p><strong>User ID:</strong> <span id="user-id"></span></p>
        
        <h3>Raw Client Principal (JSON)</h3>
        <pre class="token-box" id="json-display"></pre>
        
        <a href="/.auth/logout">Logout</a>
    </div>

    <div id="logged-out-content" class="hidden">
        <p>You are not logged in.</p>
        <a href="/.auth/login/github">Login with GitHub</a>
    </div>

    <script>
        async function getUserInfo() {
            try {
                // Azure SWA automatically hosts this system endpoint
                const response = await fetch('/.auth/me');
                const payload = await response.json();
                
                // clientPrincipal will be null if the user is not logged in
                return payload.clientPrincipal;
            } catch (error) {
                console.error("Error fetching auth data:", error);
                return null;
            }
        }

        async function init() {
            const user = await getUserInfo();
            const statusText = document.querySelector('.status');
            
            if (user) {
                statusText.innerText = "Logged In";
                document.getElementById('logged-in-content').classList.remove('hidden');
                
                // Populate the UI with user data
                document.getElementById('user-provider').innerText = user.identityProvider;
                document.getElementById('user-id').innerText = user.userDetails;
                document.getElementById('json-display').innerText = JSON.stringify(user, null, 2);
            } else {
                statusText.innerText = "Anonymous";
                document.getElementById('logged-out-content').classList.remove('hidden');
            }
        }

        // Run the function when the page loads
        init();
    </script>
</body>
</html>
